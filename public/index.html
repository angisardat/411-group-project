<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Habit Tracker Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="navbar">
  <div class="nav-left">Habit Tracker</div>
  <div class="nav-right">
    <a href="#" class="nav-link active">Dashboard</a>
    <a href="#" class="nav-link">Calendar</a>
    <a href="#" class="nav-link">Settings</a>
  </div>
</header>

<div class="container">

  <!-- Streak -->
  <div class="card">
    <h3>🔥 Streak</h3>
    <div id="streak" class="stat">0 days</div>
  </div>

  <!-- Completed -->
  <div class="card">
    <h3>✅ Completed Today</h3>
    <div id="completedCount" class="stat">0</div>
  </div>

  <!-- Add Habit -->
  <div class="card">
    <h3>➕ Add Habit</h3>
    <input type="text" id="habitInput" placeholder="Enter habit..." />
    <button id="addBtn">Add Habit</button>
  </div>

  <!-- Habit List -->
  <div class="card">
    <h3>📋 Your Habits</h3>
    <ul id="habitList"></ul>
  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
